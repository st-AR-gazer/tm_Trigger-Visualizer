<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Depth of Field icon</title>
  <desc id="desc">A magenta focus frame with blurred circles.</desc>
