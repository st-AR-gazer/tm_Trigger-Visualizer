<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Reset icon</title>
  <desc id="desc">A purple reset arrow around an empty trigger.</desc>
  <defs>
    <linearGradient id="accent" x1="44" y1="44" x2="214" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d7c1ff"/>
      <stop offset="1" stop-color="#8c6cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="24" y="24" width="208" height="208" rx="48" fill="#171820"/>
  <rect x="24" y="24" width="208" height="208" rx="48" fill="url(#accent)" opacity="0.58"/>
  <g filter="url(#shadow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
