<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Text icon</title>
  <desc id="desc">A bright text panel with a large T.</desc>
  <defs>
    <linearGradient id="accent" x1="44" y1="44" x2="214" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d6ff80"/>
      <stop offset="1" stop-color="#80ff00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="24" y="24" width="208" height="208" rx="48" fill="#171820"/>
  <rect x="24" y="24" width="208" height="208" rx="48" fill="url(#accent)" opacity="0.58"/>
  <g filter="url(#shadow)">
    <rect x="58" y="68" width="140" height="120" rx="18" fill="#f7f2ff"/>
    <text x="101" y="151" text-anchor="middle" font-family="Arial, sans-serif" font-size="86" font-weight="900" fill="#171820">T</text>
    <path d="M141 101h35M141 124h30M141 147h42" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
