<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Color Grading icon</title>
  <desc id="desc">Blue color grading sliders and tonal bars.</desc>
