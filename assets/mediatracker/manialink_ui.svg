<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">ManiaLink UI icon</title>
  <desc id="desc">A green UI panel layout.</desc>
  <defs>
    <linearGradient id="accent" x1="44" y1="44" x2="214" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#80ff80"/>
      <stop offset="1" stop-color="#00ff00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="24" y="24" width="208" height="208" rx="48" fill="#171820"/>
  <rect x="24" y="24" width="208" height="208" rx="48" fill="url(#accent)" opacity="0.58"/>
  <g filter="url(#shadow)">
    <rect x="58" y="68" width="140" height="120" rx="16" fill="none" stroke="#f7f2ff" stroke-width="6"/>
    <rect x="77" y="91" width="44" height="32" rx="8" fill="url(#accent)"/>
    <rect x="134" y="91" width="44" height="32" rx="8" fill="#f7f2ff"/>
    <rect x="77" y="139" width="101" height="26" rx="8" fill="#f7f2ff"/>
  </g>
</svg>
